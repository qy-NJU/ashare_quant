# Quantitative Pipeline Configuration

pipeline:
  name: "V4_Config_Driven_Pipeline"
  mode: "backtest_only"  # 重新训练模型，因为我们修改了 Label 的 horizon
  
  # 数据源配置
  data:
    sources:
      - "BaostockSource"  # 已弃用，数据统一从 Local Data Lake 加载
    cache_dir: "data/local_lake"
    
    # 股票池配置 (如果指定了 symbols，则优先使用 symbols，忽略 pool 配置)
    symbols: [] # 为空则使用 pool 过滤
    pool:
      board: "all"        # 跑全市场 A 股
      exchange: "all"     
      exclude_st: true    # 是否剔除 ST/*ST/退市股，过滤垃圾股防雷
      max_count: 0       # 为了跑得快点，这里限制前 10 只（如果要全市场，设为0，但这会下载很久）

  # 训练加速与数据降噪优化
  training_optimization:
    sample_rate: 0.5            # 随机降采样：仅使用 50% 的数据进行训练 (加快速度并防止过拟合，1.0为不采样)
    drop_middle: true           # 截面极值采样：丢弃表现平庸的样本，迫使模型学习强势股和弱势股的本质区别
    drop_middle_threshold: 0.4  # 丢弃收益率排在中间 40% (即 30% ~ 70%) 的样本

  # 特征预处理配置 (去极值与标准化，减少市场噪音干扰)
  preprocessing:
    dynamic_filter:       # 动态过滤僵尸股与次新股
      enable: true
      min_avg_turnover: 10000000  # 近20日日均成交额低于 1000万 的股票将被过滤 (防止流动性陷阱)
      min_listed_days: 120        # 上市不满 120 天的次新股将被过滤 (防止新股异动噪音)
    mad_clip: true        # 开启 MAD 横截面去极值 (过滤暴涨暴跌的异常噪音)
    z_score: true         # 开启 Z-Score 横截面标准化 (消除大盘Beta带来的绝对值波动)

  # 时间窗口配置
  windows:
    # 训练时间段: 2025年12月到2026年2月
    train:
      - start: "2024-01-01"
        end: "2025-12-31"
    # 回测/评测时间段: 2026年3月
    backtest:
      start: "2026-01-01"
      end: "2026-04-10"

  # 特征工程配置
  features:
    - name: "MarketFactor"
      params:
        index_symbol: "sh.000300"
    - name: "SubjectiveFactor"  # 引入主观交易逻辑量化因子 (涨停溢价、量价背离、换手突破等)
      params: {}
    - name: "PatternFactor"     # 引入形态选股因子 (均线多头、平台突破、红三兵、MACD背离等)
      params: {}
    - name: "EventFactor"       # 引入事件驱动因子 (龙虎榜机构/游资净买入等)
      params: {}
    - name: "BoardFactor"
      params:
        encode_method: "category"
    - name: "FinancialFactor"
      params: {}
    - name: "FundFlowFactor"
      params: {}
    - name: "PandasTAFactor"
      params: 
        strategy: "all"
    - name: "LabelGenerator"
      params: 
        horizon: 15  # 预测未来15日收益率，让模型学习走趋势的“慢牛股”
        # 目标类型可选:
        # 'regression' : 预测具体的收益率数值 (对应 model objective: reg:squarederror)
        # 'binary' : 预测涨跌 (只输出1和0，对应 model objective: binary:logistic)
        # 'classification_3' : 预测大涨(1)、平盘(0)、大跌(-1) (对应 model objective: multi:softmax, num_class: 3)
        # 'excess_return_binary' : 预测是否跑赢沪深300 (1表示跑赢，0表示跑输)
        # 'rank_pct' : 截面收益率百分比排名(0.0~1.0)，配合 rank:pairwise 效果最好，能解决二分类梯度为0的问题
        target_type: "rank_pct"

  # 模型配置
  model:
    name: "XGBoostWrapper"
    params:
      # 如果 target_type 是 excess_return_binary，可以使用 binary:logistic
      # 如果 target_type 是 rank_pct，强烈建议使用 'rank:pairwise'
      objective: "rank:pairwise"
      max_depth: 3                # 降低树深度，防止过拟合 (原为4)
      eta: 0.05                   # 降低学习率，让模型学习更平缓 (原为0.1)
      subsample: 0.8              # 增加行采样，增加随机性防过拟合
      colsample_bytree: 0.8       # 增加列采样，增加随机性防过拟合
      min_child_weight: 5         # 叶子节点最小权重，防止过度切分
      lambda: 1.0                 # L2 正则化
      alpha: 0.5                  # L1 正则化
    num_boost_round: 100          # 学习率降低后，适当增加训练轮数以保证收敛
    save_path: "models/saved/config_xgb.json"

  # 策略与回测配置
  strategy:
    name: "MLStrategy"
    params:
      top_k: 4                    # 持股 4 只，方便波段调仓
      target_position_ratio: 0.6  # 总仓位控制在 6 成，留出现金做缓冲
      rebalance_period: 3         # 调仓周期改为 3 天，降低交易摩擦成本，给股票时间跑出收益
      use_market_filter: false    # 关闭大盘趋势过滤，在 6 成仓位下保持策略持续运行
      max_turnover: 0.5           # 每次调仓最多换掉 50% 的仓位
      weight_method: "score"      # 'equal' (等权) 或 'score' (按预测分数加权)
    initial_capital: 100000.0
