# Quantitative Pipeline Configuration - Inference Mode (Predict Next Day)

pipeline:
  name: "V4_Inference_Pipeline"
  mode: "predict_only"  # 新增的预测模式，只加载模型输出当天分数，不跑回测
  
  # 数据源配置
  data:
    sources:
      - "BaostockSource"
    cache_dir: "data/local_lake"
    
    symbols: [] # 为空则使用 pool 过滤
    pool:
      board: "all"        
      exchange: "all"     
      exclude_st: true    
      max_count: 0       

  # 预测日期配置 (设置你要计算信号的那天，通常是最新交易日)
  prediction:
    target_date: "2026-04-20"  # 根据此日期的盘后数据，预测 T+1 日的 Top N 股票

  # 特征预处理配置 (必须与训练时保持一致)
  preprocessing:
    dynamic_filter:       
      enable: true
      min_avg_turnover: 10000000  
      min_listed_days: 120        
    mad_clip: true        
    z_score: true         

  # 特征工程配置 (必须与训练时完全一致)
  features:
    - name: "MarketFactor"
      params:
        index_symbol: "sh.000300"
    - name: "SubjectiveFactor"  
      params: {}
    - name: "PatternFactor"     
      params: {}
    - name: "EventFactor"       
      params: {}
    - name: "BoardFactor"
      params:
        encode_method: "category"
    - name: "FinancialFactor"
      params: {}
    - name: "FundFlowFactor"
      params: {}
    - name: "PandasTAFactor"
      params: 
        strategy: "all"

  # 模型配置 (用于加载已训练好的模型)
  model:
    name: "XGBoostWrapper"
    params: {}  # XGBoostWrapper 不需要 params 就可以通过 load_path 加载
    load_path: "models/saved/config_xgb.json" # 指定之前训练好的模型文件路径

  # 选股策略配置 (决定输出多少只股票)
  strategy:
    name: "MLStrategy"
    params:
      top_k: 4                    # 输出排名前 4 的股票
      weight_method: "score"      # 按预测分数分配权重 (默认为 equal)
